<!DOCTYPE html>
<html>
<head>
  <title>WorldOIL</title>
</head>

<body>

<h1>WorldOIL is loading</h1>

<input id="address" placeholder="Address">
<input id="phone" placeholder="Phone">
<input id="time" type="datetime-local">

<button onclick="submitRequest()">Submit</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

 const firebaseConfig = {
    apiKey: "AIzaSyCcDTr6FBQ06ajniOC-gH-pXkfvwRa3XMY",
    authDomain: "worldoil.firebaseapp.com",
    projectId: "worldoil",
    storageBucket: "worldoil.firebasestorage.app",
    messagingSenderId: "220116522882",
    appId: "1:220116522882:web:b768705a85cb9a31ce219b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

window.submitRequest = async function () {
  const address = document.getElementById("address").value;
  const phone = document.getElementById("phone").value;
  const time = document.getElementById("time").value;

  if (!address || !phone || !time) {
    alert("Fill all fields");
    return;
  }

  const res = await fetch("https://worldoil.onrender.com/appointment", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      address,
      phone,
      time
    })
  });

  const data = await res.json();

  if (data.success) {
    alert("Request sent!");
  } else {
    alert("Error sending request");
  }
};
</script>

</body>
</html>
