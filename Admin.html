<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>
<body>

<h2>Appointment Requests</h2>

<ul id="list"></ul>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_PROJECT_ID"
  };

  const app = firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  async function loadRequests() {
    const snapshot = await db.collection("requests").get();
    const list = document.getElementById("list");
    list.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      const li = document.createElement("li");
      li.innerHTML = `
        ${data.address} | ${data.phone} | ${data.time} | ${data.status}
        <button onclick="updateStatus('${doc.id}', 'accepted')">Accept</button>
        <button onclick="updateStatus('${doc.id}', 'declined')">Decline</button>
      `;

      list.appendChild(li);
    });
  }

  async function updateStatus(id, status) {
    await db.collection("requests").doc(id).update({ status });
    loadRequests();
  }

  loadRequests();
</script>

</body>
</html>
